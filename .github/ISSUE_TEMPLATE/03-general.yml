name: "💬 일반 문의"
description: "네이버로그인 관련 기타 문의 사항이 있을 때 사용해 주세요."
title: "[문의] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        네이버로그인 관련 문의 사항을 자유롭게 작성해 주세요.
        > ⚠️ **Client Secret은 절대 기입하지 마세요. Client ID만 입력해 주세요.**

  - type: input
    id: client-id
    attributes:
      label: Client ID
      description: 개발자센터에 등록된 Client ID를 입력해 주세요. (Client Secret은 절대 입력하지 마세요)
      placeholder: "예: abc123xyz"
    validations:
      required: false

  - type: input
    id: service-url
    attributes:
      label: 서비스 URL
      description: 개발자센터에 등록하신 서비스 URL을 입력해 주세요.
      placeholder: "예: https://www.example.com"
    validations:
      required: false

  - type: textarea
    id: question
    attributes:
      label: 문의 내용
      description: 문의하실 내용을 자세히 작성해 주세요.
      placeholder: "문의 내용을 입력해 주세요."
    validations:
      required: true

  - type: textarea
    id: error-description
    attributes:
      label: 오류 현상 (해당되는 경우)
      description: 오류가 발생하고 있다면 어떤 현상인지 작성해 주세요.
      placeholder: "예: 특정 상황에서 오류 메시지가 노출됩니다."
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: 오류 발생 환경 (해당되는 경우)
      multiple: true
      options:
        - Android
        - iOS
        - PC (웹브라우저)
        - 앱 내 WebView
        - 해당 없음
    validations:
      required: false

  - type: textarea
    id: repro-steps
    attributes:
      label: 오류 재현 스텝 (해당되는 경우)
      description: 오류를 재현해보려면 어떤 절차로 진행해야 하는지 순서대로 적어주시면 빠른 원인 파악에 도움이 됩니다.
      placeholder: |
        1. 
        2. 
        3.
    validations:
      required: false

  - type: textarea
    id: suspected-cause
    attributes:
      label: 짐작되는 원인 (해당되는 경우)
      description: 혹시 원인을 짐작하고 계신다면 자유롭게 작성해 주세요.
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ### * 네이버로그인 뱃지가 노출이 안되는 경우
        - 네이버로그인 뱃지가 노출되지 않으면 다음의 사항을 확인해주세요.
           1) 개발자센터에 등록된 '서비스 URL'이 광고나 사이트 검색에 노출되는 URL과 동일한지 여부
           2) 일정 수준 이상의 사용자가 발생하는지 여부

        ### * 등록자 아이디 변경이 필요한 경우
        - [문의폼](https://help.naver.com/support/alias/naveridlogin/naveridlogin_03.naver)으로 접수해주세요.

        ### * 네이버로그인 영문 가이드가 필요한 경우
        - dl_naverid@navercorp.com 으로 문의 해주세요.

        ### * 서비스 설정에 오류가 있다는 메시지가 노출되는 경우
        - [도움말](https://help.naver.com/support/alias/naveridlogin/naveridlogin_02.naver)을 참고해 주세요.

        ### * 참고
        - [적용 가이드](https://developers.naver.com/products/login/userguide/)
        - [개발 가이드](https://developers.naver.com/docs/login/devguide/)
        - [검수 가이드](https://developers.naver.com/docs/login/verify/)
