name: "🔧 기술 문의 - REST API 설정"
description: "네이버로그인 REST API 설정 중 궁금한 점이 있을 때 사용해 주세요."
title: "[REST API] "
labels: ["question", "rest-api"]
body:
  - type: markdown
    attributes:
      value: |
        REST API 설정 관련 문의 시 아래 항목을 최대한 자세히 작성해 주시면 빠른 답변에 도움이 됩니다.
        > ⚠️ **Client Secret은 절대 기입하지 마세요. Client ID만 입력해 주세요.**

  - type: input
    id: client-id
    attributes:
      label: Client ID
      description: 개발자센터에 등록된 Client ID를 입력해 주세요. (Client Secret은 절대 입력하지 마세요)
      placeholder: "예: abc123xyz"
    validations:
      required: true

  - type: input
    id: service-url
    attributes:
      label: 서비스 URL
      description: 개발자센터에 등록하신 서비스 URL을 입력해 주세요.
      placeholder: "예: https://www.example.com"
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: 문의 내용
      description: REST API 설정 중 궁금하신 점을 자세히 작성해 주세요.
      placeholder: "예: redirect_uri 설정 시 서브도메인을 어떻게 등록해야 하나요?"
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: 시도해 본 내용
      description: 이미 시도해 보신 내용이 있으면 작성해 주세요.
      placeholder: "예: 개발가이드 문서를 참고하여 설정해봤으나 여전히 문제가 있습니다."
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: 오류 발생 환경
      description: 해당되는 환경을 모두 선택해 주세요.
      multiple: true
      options:
        - Android
        - iOS
        - PC (웹브라우저)
        - 앱 내 WebView
        - 기타
    validations:
      required: false

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: 기대 동작 vs 실제 동작
      description: 어떻게 동작하길 기대했는지, 실제로는 어떻게 동작했는지 작성해 주세요.
      placeholder: |
        - 기대: 로그인 후 redirect_uri로 정상 이동
        - 실제: 오류 페이지가 노출됨
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ### * 네이버로그인 뱃지가 노출이 안되는 경우
        - 네이버로그인 뱃지가 노출되지 않으면 다음의 사항을 확인해주세요.
           1) 개발자센터에 등록된 '서비스 URL'이 광고나 사이트 검색에 노출되는 URL과 동일한지 여부
           2) 일정 수준 이상의 사용자가 발생하는지 여부

        ### * 등록자 아이디 변경이 필요한 경우
        - [문의폼](https://help.naver.com/support/alias/naveridlogin/naveridlogin_03.naver)으로 접수해주세요.

        ### * 네이버로그인 영문 가이드가 필요한 경우
        - dl_naverid@navercorp.com 으로 문의 해주세요.

        ### * 서비스 설정에 오류가 있다는 메시지가 노출되는 경우
        - [도움말](https://help.naver.com/support/alias/naveridlogin/naveridlogin_02.naver)을 참고해 주세요.

        ### * 참고
        - [적용 가이드](https://developers.naver.com/products/login/userguide/)
        - [개발 가이드](https://developers.naver.com/docs/login/devguide/)
        - [검수 가이드](https://developers.naver.com/docs/login/verify/)
